<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thư Tỏ Tình</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ffe6e6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .heart {
            font-size: 100px;
            color: #ff4d4d;
            animation: beat 1s infinite;
            margin-bottom: 20px;
        }
        @keyframes beat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .message {
            font-size: 24px;
            text-align: center;
            margin-bottom: 40px;
            max-width: 600px;
        }
        .buttons {
            display: flex;
            gap: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .yes {
            background-color: #4CAF50;
            color: white;
        }
        .yes:hover {
            background-color: #45a049;
        }
        .no {
            background-color: #f44336;
            color: white;
            transition: all 0.3s ease;
        }
        .no:hover {
            background-color: #da190b;
            transform: translateX(100px);
        }
    </style>
</head>
<body>
    <div class="heart">❤️</div>
    <p class="message">
        Anh yêu em nhiều lắm! Em là người đặc biệt nhất trong cuộc đời anh. 
        Hãy cho anh cơ hội được bên em mãi mãi nhé!
    </p>
    <div class="buttons">
        <button class="yes" onclick="alert('Yay! Anh yêu em!')">Yes</button>
        <button class="no" onclick="alert('Không sao, anh vẫn yêu em!')">No</button>
    </div>

    <script>
        const noButton = document.querySelector('.no');
        noButton.addEventListener('mouseover', function() {
            const rect = this.getBoundingClientRect();
            const diagonal = Math.sqrt(rect.width * rect.width + rect.height * rect.height);
            const minDistance = 2.5 * diagonal;
            
            // Tạo hướng ngẫu nhiên
            const angle = Math.random() * 2 * Math.PI;
            
            // Khoảng cách tối thiểu + biến động ngẫu nhiên
            const distance = minDistance + Math.random() * 150;
            
            const randomX = distance * Math.cos(angle);
            const randomY = distance * Math.sin(angle);
            
            this.style.transform = `translate(${randomX}px, ${randomY}px)`;
        });
    </script>
</body>
</html>
