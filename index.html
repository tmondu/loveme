<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thư Tỏ Tình</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ffe6e6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .heart-3d {
            position: relative;
            width: 100px;
            height: 90px;
            margin-bottom: 20px;
            animation: beat 1s infinite;
        }
        .heart-3d::before,
        .heart-3d::after {
            content: '';
            position: absolute;
            left: 50px;
            top: 0;
            width: 50px;
            height: 80px;
            background: #ff4d4d;
            border-radius: 50px 50px 0 0;
            transform: rotate(-45deg);
            transform-origin: 0 100%;
        }
        .heart-3d::after {
            left: 0;
            transform: rotate(45deg);
            transform-origin: 100% 100%;
        }
        .heart-3d .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            animation: sparkle 2s infinite;
        }
        .heart-3d .sparkle:nth-child(1) { top: 20px; left: 30px; animation-delay: 0s; }
        .heart-3d .sparkle:nth-child(2) { top: 35px; left: 45px; animation-delay: 0.5s; }
        .heart-3d .sparkle:nth-child(3) { top: 50px; left: 25px; animation-delay: 1s; }
        .heart-3d .sparkle:nth-child(4) { top: 30px; left: 60px; animation-delay: 1.5s; }
        @keyframes beat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1); }
        }
        .message {
            font-size: 24px;
            text-align: center;
            margin-bottom: 40px;
            max-width: 600px;
        }
        .buttons {
            display: flex;
            gap: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .yes {
            background-color: #4CAF50;
            color: white;
        }
        .yes:hover {
            background-color: #45a049;
        }
        .no {
            background-color: #f44336;
            color: white;
            transition: all 0.3s ease;
        }
        .no:hover {
            background-color: #da190b;
            transform: translateX(100px);
        }
    </style>
</head>
<body>
    <div class="heart-3d">
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
    </div>
    <p class="message">
        Anh yêu em nhiều lắm! Em là người đặc biệt nhất trong cuộc đời anh. 
        Hãy cho anh cơ hội được bên em mãi mãi nhé!
    </p>
    <div class="buttons">
        <button class="yes" onclick="alert('Yay! Anh yêu em!')">Yes</button>
        <button class="no" onclick="alert('Không sao, anh vẫn yêu em!')">No</button>
    </div>

    <script>
        const noButton = document.querySelector('.no');
        noButton.addEventListener('mouseover', function() {
            const rect = this.getBoundingClientRect();
            const diagonal = Math.sqrt(rect.width * rect.width + rect.height * rect.height);
            const minDistance = 2.5 * diagonal;
            
            // Tạo hướng ngẫu nhiên
            const angle = Math.random() * 2 * Math.PI;
            
            // Khoảng cách tối thiểu + biến động ngẫu nhiên
            const distance = minDistance + Math.random() * 150;
            
            const randomX = distance * Math.cos(angle);
            const randomY = distance * Math.sin(angle);
            
            this.style.transform = `translate(${randomX}px, ${randomY}px)`;
        });
    </script>
</body>
</html>
