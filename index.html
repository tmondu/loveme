<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Diamond Heart</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #0b0614;
            --surface: #1f122d;
            --accent: #ff6cc9;
            --glow: rgba(255, 108, 201, 0.35);
            --spark: rgba(255, 255, 255, 0.9);
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            min-height: 100%;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: radial-gradient(circle at top, rgba(255, 108, 201, 0.14), transparent 28%),
                        radial-gradient(circle at bottom right, rgba(75, 35, 150, 0.4), transparent 28%),
                        var(--bg);
            color: #f7eefb;
            font-family: Inter, system-ui, sans-serif;
            min-height: 100vh;
            padding: 24px;
        }

        .page {
            width: min(95vw, 1024px);
            display: grid;
            gap: 28px;
            justify-items: center;
        }

        .scene {
            width: min(420px, 90vw);
            aspect-ratio: 1 / 1;
            display: grid;
            place-items: center;
            perspective: 1200px;
        }

        .heart-shell {
            width: 260px;
            height: 260px;
            position: relative;
            transform-style: preserve-3d;
            animation: float 6s ease-in-out infinite;
        }

        .heart {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(18deg) rotateY(-18deg);
            animation: heartbeat 1.2s ease-in-out infinite;
        }

        .heart::before,
        .heart::after,
        .heart .core {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50% 50% 44% 44% / 54% 54% 46% 46%;
            background: linear-gradient(150deg, rgba(255, 220, 255, 0.98), rgba(206, 119, 255, 0.35) 20%, rgba(113, 21, 104, 0.95) 65%);
            box-shadow: inset 0 0 28px rgba(255, 255, 255, 0.38), 0 28px 120px rgba(215, 90, 176, 0.18);
        }

        .heart::before {
            top: -18%;
            left: 14%;
            width: 54%;
            height: 54%;
            border-radius: 50% 50% 40% 40%;
            transform: translateZ(18px) rotateZ(-25deg);
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.95), transparent 28%),
                        linear-gradient(145deg, rgba(251, 111, 199, 0.92), rgba(185, 45, 141, 0.98));
        }

        .heart::after {
            top: -18%;
            right: 14%;
            width: 54%;
            height: 54%;
            border-radius: 50% 50% 40% 40%;
            transform: translateZ(18px) rotateZ(25deg);
            background: radial-gradient(circle at 70% 30%, rgba(255, 255, 255, 0.88), transparent 28%),
                        linear-gradient(35deg, rgba(255, 152, 241, 0.95), rgba(163, 40, 128, 0.96));
        }

        .heart .core {
            transform: translateZ(12px) scale(0.98);
            filter: drop-shadow(0 0 24px rgba(255, 143, 210, 0.35));
        }

        .heart::before,
        .heart::after,
        .heart .core {
            mix-blend-mode: screen;
        }

        .heart::before {
            opacity: 0.95;
        }

        .heart::after {
            opacity: 0.95;
        }

        .heart-shell::before {
            content: '';
            position: absolute;
            inset: -20px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 150, 214, 0.16), transparent 45%);
            filter: blur(22px);
            z-index: -2;
        }

        .heart-shell::after {
            content: '';
            position: absolute;
            inset: -34px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 116, 201, 0.08), transparent 48%);
            filter: blur(48px);
            z-index: -3;
        }

        .shine {
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, transparent 35%, rgba(255, 255, 255, 0.7) 44%, rgba(255, 255, 255, 0.08) 55%, transparent 65%);
            transform: translateX(-140%) rotateZ(10deg);
            pointer-events: none;
            animation: shimmer 2.8s linear infinite;
            mix-blend-mode: screen;
        }

        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.95), rgba(255,255,255,0.2) 50%);
            opacity: 0;
            filter: blur(1px);
            animation: drift 4s ease-in-out infinite;
        }

        .particle:nth-child(1) { top: 12%; left: 15%; animation-delay: 0s; animation-duration: 4.2s; }
        .particle:nth-child(2) { top: 32%; left: 82%; animation-delay: 0.6s; animation-duration: 4.5s; }
        .particle:nth-child(3) { top: 68%; left: 10%; animation-delay: 1.3s; animation-duration: 4.4s; }
        .particle:nth-child(4) { top: 75%; left: 74%; animation-delay: 1.9s; animation-duration: 4.6s; }
        .particle:nth-child(5) { top: 53%; left: 50%; animation-delay: 0.4s; animation-duration: 4.1s; }

        .title {
            font-size: clamp(1.7rem, 2.5vw, 3rem);
            letter-spacing: 0.04em;
            margin: 0;
        }

        .subtitle {
            max-width: 640px;
            font-size: clamp(1rem, 1.2vw, 1.2rem);
            line-height: 1.8;
            color: #d3c1dc;
            margin: 0;
        }

        .buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
        }

        .button {
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            padding: 14px 26px;
            border-radius: 999px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
            backdrop-filter: blur(8px);
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 28px rgba(255, 84, 181, 0.2);
            background: rgba(255, 255, 255, 0.16);
        }

        @keyframes heartbeat {
            0%, 100% { transform: rotateX(18deg) rotateY(-18deg) scale(1); }
            30% { transform: rotateX(18deg) rotateY(-18deg) scale(1.06); }
            50% { transform: rotateX(18deg) rotateY(-18deg) scale(0.98); }
            70% { transform: rotateX(18deg) rotateY(-18deg) scale(1.04); }
        }

        @keyframes shimmer {
            0% { transform: translateX(-140%) rotateZ(10deg); opacity: 0.8; }
            50% { transform: translateX(140%) rotateZ(10deg); opacity: 1; }
            100% { transform: translateX(260%) rotateZ(10deg); opacity: 0.8; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-18px); }
        }

        @keyframes drift {
            0%, 100% { opacity: 0; transform: translate(0, 0) scale(0.6); }
            20% { opacity: 1; }
            50% { opacity: 0.55; transform: translate(calc(var(--x, 0) * 1px), calc(var(--y, 0) * 1px)) scale(1.1); }
            80% { opacity: 0.2; }
        }

        @media (max-width: 640px) {
            .heart-shell { width: 200px; height: 200px; }
            .title { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="scene">
            <div class="heart-shell" id="heartShell">
                <div class="heart"></div>
                <div class="shine"></div>
                <span class="particle" style="--x: -16; --y: -32;"></span>
                <span class="particle" style="--x: 18; --y: -42;"></span>
                <span class="particle" style="--x: -24; --y: 38;"></span>
                <span class="particle" style="--x: 22; --y: 40;"></span>
                <span class="particle" style="--x: 0; --y: 54;"></span>
            </div>
        </div>

        <div>
            <h1 class="title">Trái tim kim cương</h1>
            <p class="subtitle">Em bé có iu anh khum</p>
        </div>

        <div class="buttons">
            <button class="button" onclick="alert('Yêu rồi thì phải giữ trọn!')">Yes</button>
            <button class="button" id="noButton" onclick="alert('Dù sao anh vẫn giữ trái tim này cho em!')">No</button>
        </div>
    </div>

    <script>
        const heartShell = document.getElementById('heartShell');

        heartShell.addEventListener('mousemove', (event) => {
            const rect = heartShell.getBoundingClientRect();
            const x = (event.clientX - rect.left) / rect.width - 0.5;
            const y = (event.clientY - rect.top) / rect.height - 0.5;
            const rotateY = x * 18;
            const rotateX = -y * 18;
            heartShell.style.transform = `perspective(1200px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });

        heartShell.addEventListener('mouseleave', () => {
            heartShell.style.transform = 'perspective(1200px) rotateX(0deg) rotateY(0deg)';
        });

        // No button escape functionality
        const noButton = document.getElementById('noButton');
        noButton.addEventListener('mouseover', function() {
            const rect = this.getBoundingClientRect();
            const diagonal = Math.sqrt(rect.width * rect.width + rect.height * rect.height);
            const minDistance = 2.5 * diagonal;
            
            const padding = 40;
            const maxX = window.innerWidth - rect.width - padding;
            const maxY = window.innerHeight - rect.height - padding;
            const minX = padding;
            const minY = padding;
            
            let randomX, randomY;
            let attempts = 0;
            
            do {
                const angle = Math.random() * 2 * Math.PI;
                const distance = minDistance + Math.random() * 150;
                
                randomX = distance * Math.cos(angle);
                randomY = distance * Math.sin(angle);
                
                // Tính vị trí mới tuyệt đối
                let newX = rect.left + randomX;
                let newY = rect.top + randomY;
                
                // Giữ trong phạm vi viewport bằng cách giới hạn
                newX = Math.min(Math.max(newX, minX), maxX);
                newY = Math.min(Math.max(newY, minY), maxY);
                
                randomX = newX - rect.left;
                randomY = newY - rect.top;
                
                attempts++;
            } while (attempts < 20 && (Math.abs(randomX) < minDistance || Math.abs(randomY) < minDistance));
            
            this.style.transform = `translate(${randomX}px, ${randomY}px)`;
        });
    </script>
</body>
</html>
